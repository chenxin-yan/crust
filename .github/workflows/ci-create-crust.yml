name: CI Create Crust

on:
  pull_request:
    branches:
      - main
    paths:
      - "packages/create-crust/**"
      - "packages/create/**"
      - "packages/core/**"
      - "packages/prompts/**"
      - "packages/style/**"
      - "package.json"
      - "bun.lock"
      - "turbo.json"
      - "tsconfig*.json"
      - ".github/workflows/ci-create-crust.yml"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  smoke:
    strategy:
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun ci

      - name: Cache Turbo
        uses: actions/cache@v5
        with:
          path: .turbo
          key: turbo-create-crust-${{ runner.os }}-${{ github.sha }}
          restore-keys: |
            turbo-create-crust-${{ runner.os }}-

      - name: Build create-crust dependency subset
        run: bun turbo run build --filter=./packages/style --filter=./packages/prompts --filter=./packages/core --filter=./packages/create --filter=./packages/create-crust

      - name: Print tool versions
        run: |
          node --version
          npm --version
          bun --version

      - name: Run create-crust smoke test
        run: bun run --cwd packages/create-crust test:smoke
        env:
          CREATE_CRUST_SMOKE: "1"

      - name: Upload smoke workspace on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: create-crust-smoke-${{ matrix.os }}
          path: ${{ runner.temp }}/create-crust-smoke
          if-no-files-found: ignore
